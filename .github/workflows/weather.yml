name: Update Ankara Weather

on:
  schedule:
    - cron: "0 */6 * * *"  # Her 6 saatte bir güncelle
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Hava durumunu çek
        id: weather
        run: |
          WEATHER=$(curl -s "https://wttr.in/Ankara?format=%C+·+%t" | tr -d '\n')
          echo "data=$WEATHER" >> $GITHUB_OUTPUT

      - name: README güncelle
        run: |
          WEATHER="${{ steps.weather.outputs.data }}"
          sed -i "s|🌤️ \*\*Ankara:\*\*.*|🌤️ **Ankara:** $WEATHER|" README.md

      - name: Commit
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git diff --staged --quiet || git commit -m "🌤️ Hava durumu güncellendi"
          git push
