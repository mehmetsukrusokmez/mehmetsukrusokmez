name: Update Ankara Weather

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Hava durumunu çek ve README güncelle
        run: |
          python3 << 'EOF'
          import urllib.request
          import urllib.parse
          import re

          temp = urllib.request.urlopen("https://wttr.in/Ankara?format=%t").read().decode().strip().replace("+", "").replace(" ", "")
          cond = urllib.request.urlopen("https://wttr.in/Ankara?format=%C").read().decode().strip()
          label = urllib.parse.quote(f"{temp} · {cond}", safe="")

          with open("README.md", "r") as f:
              content = f.read()

          content = re.sub(
              r'<img src="https://img\.shields\.io/badge/📍_Ankara-[^"]+\" width="780"[^/]*/?>',
              f'<img src="https://img.shields.io/badge/📍_Ankara-{label}-4f8ef7?style=for-the-badge&logo=icloud&logoColor=white" width="780" alt="Ankara Hava Durumu" />',
              content
          )

          with open("README.md", "w") as f:
              f.write(content)

          print(f"Hava durumu güncellendi: {temp} · {cond}")
          EOF

      - name: Commit
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          git diff --staged --quiet || git commit -m "🌤️ Hava durumu güncellendi"
          git push
